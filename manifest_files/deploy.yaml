apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-01
  namespace: gitlab
  labels:
    app: deployment-01
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment-01
  template:
    metadata:
      labels:
        app: deployment-01
    spec:
      containers:
      - name: deployment-01
        image: elidrydoker/node-k8s:1.2.0
        ports:
        - containerPort: 3000
