apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment_01
  labels:
    app: deployment_01
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment_01
  template:
    metadata:
      labels:
        app: deployment_01
    spec:
      containers:
      - name: deployment_01
        image: elidrydocker/node-k8s:latest
        ports:
        - containerPort: 3000